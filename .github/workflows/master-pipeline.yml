name: ControlPlane — Master Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  VAULT_ADDR: http://localhost:8200
  OPA_URL: http://localhost:8181
  KEYCLOAK_URL: http://localhost:8080

###############################################################################
# Stage 1: Shared Infrastructure Validation
###############################################################################
jobs:
  validate-vault-policies:
    name: "Validate Vault Policies"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Vault CLI
        run: |
          # Keep the original filename so the SHA256SUMS entry matches
          wget -qO /tmp/vault_1.15.0_linux_amd64.zip \
            https://releases.hashicorp.com/vault/1.15.0/vault_1.15.0_linux_amd64.zip
          wget -qO /tmp/vault_1.15.0_SHA256SUMS \
            https://releases.hashicorp.com/vault/1.15.0/vault_1.15.0_SHA256SUMS
          (cd /tmp && grep "vault_1.15.0_linux_amd64.zip" vault_1.15.0_SHA256SUMS | sha256sum -c -)
          unzip -q /tmp/vault_1.15.0_linux_amd64.zip -d /usr/local/bin/
          vault --version

      - name: Validate HCL policy syntax
        run: |
          # vault policy fmt reformats in-place and exits non-zero on syntax errors.
          # Copy the file first, format it, then diff original vs formatted to detect
          # unformatted files without relying on git index state.
          for f in shared/infrastructure/vault/policies/*.hcl; do
            echo "Validating $f"
            tmp=$(mktemp)
            cp "$f" "$tmp"
            vault policy fmt "$f" || exit 1
            if ! diff -q "$tmp" "$f" > /dev/null; then
              echo "FAIL: $f is not properly formatted. Run 'vault policy fmt $f' locally."
              rm "$tmp"
              exit 1
            fi
            rm "$tmp"
          done

  validate-opa-policies:
    name: "Validate OPA Policies"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install OPA
        run: |
          # Download to /tmp first so checksum file's basename matches
          curl -sL -o /tmp/opa_linux_amd64_static \
            https://openpolicyagent.org/downloads/v0.60.0/opa_linux_amd64_static
          curl -sL -o /tmp/opa_linux_amd64_static.sha256 \
            https://openpolicyagent.org/downloads/v0.60.0/opa_linux_amd64_static.sha256
          (cd /tmp && sha256sum -c opa_linux_amd64_static.sha256)
          install -m 755 /tmp/opa_linux_amd64_static /usr/local/bin/opa
          opa version

      - name: OPA syntax check
        run: opa check shared/infrastructure/opa/policies.rego

      - name: OPA format check
        run: opa fmt --fail shared/infrastructure/opa/policies.rego

  scan-shared-configs:
    name: "Scan Shared Configs"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Checkov and detect-secrets
        run: pip install checkov detect-secrets

      - name: Checkov — IaC scan
        run: |
          checkov -d shared/infrastructure/ \
            --skip-check CKV_SECRET_6 \
            --output cli || true

      - name: detect-secrets scan
        run: |
          # Excluded paths (all contain intentional placeholder/dev credentials):
          #   *.hcl                            — Vault policy files (no secrets, only path rules)
          #   shared/scripts/*                 — Demo attack/setup scripts
          #   shared/infrastructure/monitoring — Dev-only infra (Vault dev root token in prometheus.yml)
          #   shared/infrastructure/keycloak   — Dev-only Keycloak realm config
          detect-secrets scan shared/ \
            --exclude-files '.*\.hcl' \
            --exclude-files 'shared/scripts/.*' \
            --exclude-files 'shared/infrastructure/monitoring/.*' \
            --exclude-files 'shared/infrastructure/keycloak/.*' \
            > /tmp/secrets-baseline.json
          cat /tmp/secrets-baseline.json | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          results = data.get('results', {})
          if results:
              print('FAIL: Potential secrets detected:')
              for f, findings in results.items():
                  for finding in findings:
                      print(f'  {f}:{finding[\"line_number\"]} — {finding[\"type\"]}')
              sys.exit(1)
          else:
              print('PASS: No secrets detected')
          "

  ###############################################################################
  # Stage 2: Per-Project Pipelines (parallel, depend on Stage 1)
  ###############################################################################

  pipeline-app-devsecops:
    name: "Pipeline: App DevSecOps"
    needs: [validate-vault-policies, validate-opa-policies, scan-shared-configs]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: projects/app-devsecops/package-lock.json

      - name: Install dependencies
        working-directory: projects/app-devsecops
        run: npm ci

      - name: Lint
        working-directory: projects/app-devsecops
        run: npm run lint

      - name: Unit tests
        working-directory: projects/app-devsecops
        run: npm test

      - name: SAST — ESLint security
        working-directory: projects/app-devsecops
        run: |
          npx eslint src/ --rule '{"no-eval": "error"}' --format json \
            -o /tmp/eslint-results.json || true

      - name: Container scan — Trivy
        uses: aquasecurity/trivy-action@0.19.0
        with:
          scan-type: "fs"
          scan-ref: "projects/app-devsecops"
          severity: "HIGH,CRITICAL"
          exit-code: "0"
          format: "table"

      - name: Upload scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-devsecops-results
          path: /tmp/eslint-results.json

  pipeline-zero-trust:
    name: "Pipeline: Zero Trust"
    needs: [validate-vault-policies, validate-opa-policies, scan-shared-configs]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install OPA
        run: |
          # Download to /tmp first so checksum file's basename matches
          curl -sL -o /tmp/opa_linux_amd64_static \
            https://openpolicyagent.org/downloads/v0.60.0/opa_linux_amd64_static
          curl -sL -o /tmp/opa_linux_amd64_static.sha256 \
            https://openpolicyagent.org/downloads/v0.60.0/opa_linux_amd64_static.sha256
          (cd /tmp && sha256sum -c opa_linux_amd64_static.sha256)
          install -m 755 /tmp/opa_linux_amd64_static /usr/local/bin/opa

      - name: Validate OPA policies
        run: opa check projects/zero-trust/policies/

      - name: Checkov — Zero Trust IaC
        run: |
          pip install checkov
          checkov -d projects/zero-trust/ --output cli || true

  pipeline-cloud-native:
    name: "Pipeline: Cloud Native"
    needs: [validate-vault-policies, validate-opa-policies, scan-shared-configs]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"
          terraform_wrapper: false

      - name: Terraform validate — AWS
        working-directory: projects/cloud-native/terraform/aws
        run: terraform init -backend=false && terraform validate

      - name: Terraform validate — Azure
        working-directory: projects/cloud-native/terraform/azure
        run: terraform init -backend=false && terraform validate

      - name: Terraform validate — GCP
        working-directory: projects/cloud-native/terraform/gcp
        run: terraform init -backend=false && terraform validate

      - name: Checkov — IaC security scan
        run: |
          pip install checkov
          checkov -d projects/cloud-native/terraform/ --output cli || true

      - name: tfsec
        env:
          TFSEC_VERSION: "v1.28.6"
        run: |
          curl -sL -o /tmp/tfsec \
            "https://github.com/aquasecurity/tfsec/releases/download/${TFSEC_VERSION}/tfsec-linux-amd64"
          curl -sL -o /tmp/tfsec_checksums.txt \
            "https://github.com/aquasecurity/tfsec/releases/download/${TFSEC_VERSION}/tfsec_checksums.txt"
          # Extract expected hash for tfsec-linux-amd64 and compare
          EXPECTED=$(grep "tfsec-linux-amd64$" /tmp/tfsec_checksums.txt | awk '{print $1}')
          ACTUAL=$(sha256sum /tmp/tfsec | awk '{print $1}')
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "FAIL: tfsec checksum mismatch (expected=$EXPECTED actual=$ACTUAL)"
            exit 1
          fi
          install -m 755 /tmp/tfsec /usr/local/bin/tfsec
          tfsec projects/cloud-native/terraform/ || true

  pipeline-compliance:
    name: "Pipeline: Compliance"
    needs: [validate-vault-policies, validate-opa-policies, scan-shared-configs]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Python dependencies
        run: pip install yamllint flask pyyaml prometheus-client

      - name: Validate compliance YAMLs
        run: |
          yamllint projects/compliance/compliance/ || true

      - name: Compliance report generation
        run: |
          cd projects/compliance/reporter
          python3 -c "
          import sys
          sys.path.insert(0, '.')
          import os
          os.environ['COMPLIANCE_DIR'] = '../compliance'
          from app import load_controls
          controls = load_controls()
          total = sum(len(v) for v in controls.values())
          print(f'Controls loaded: {total} across {len(controls)} frameworks')
          for fw, ctrls in controls.items():
              print(f'  {fw}: {len(ctrls)} controls')
          "

  pipeline-mobile:
    name: "Pipeline: Mobile Security"
    needs: [validate-vault-policies, validate-opa-policies, scan-shared-configs]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: SAST — Semgrep
        run: |
          pip install semgrep || true
          semgrep --config=auto \
            projects/mobile/ \
            --include="*.kt" --include="*.swift" \
            --json -o /tmp/semgrep-results.json || true

      - name: Secret detection — mobile source
        run: |
          pip install detect-secrets
          detect-secrets scan projects/mobile/android/ projects/mobile/ios/ \
            > /tmp/mobile-secrets.json || true
          python3 -c "
          import json
          data = json.load(open('/tmp/mobile-secrets.json'))
          results = data.get('results', {})
          if results:
              print('WARNING: Potential secrets in mobile source:')
              for f, findings in results.items():
                  for x in findings:
                      print(f'  {f}:{x[\"line_number\"]} — {x[\"type\"]}')
          else:
              print('PASS: No secrets detected in mobile source')
          " || true

  ###############################################################################
  # Stage 3: Integration Tests
  ###############################################################################

  integration-tests:
    name: "Integration Tests"
    needs:
      - pipeline-app-devsecops
      - pipeline-zero-trust
      - pipeline-cloud-native
      - pipeline-compliance
      - pipeline-mobile
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Start shared infra (smoke test)
        run: |
          docker compose up -d vault opa
          timeout 60 bash -c 'until curl -sf http://localhost:8181/health; do sleep 2; done'
          timeout 60 bash -c 'until curl -sf http://localhost:8200/v1/sys/health; do sleep 2; done'

      - name: OPA health check
        run: curl -sf http://localhost:8181/health

      - name: Vault health check
        run: |
          curl -sf http://localhost:8200/v1/sys/health | \
            python3 -c "import sys,json; d=json.load(sys.stdin); print('Vault status:', 'initialized' if d.get('initialized') else 'not initialized')"

      - name: OPA policy integration test
        run: |
          curl -s -X POST http://localhost:8181/v1/data/authorization/allow \
            -H 'Content-Type: application/json' \
            -d '{
              "input": {
                "user": {"name":"test","roles":["admin"],"groups":[],"team":"security","type":"human"},
                "resource": {"name":"test","type":"api","environment":"development","team":"security","allowed_service_accounts":[]},
                "request": {"method":"GET","protocol":"https","source_ip":"10.0.0.1","authenticated":true,"mfa_verified":true,"headers":{"Content-Security-Policy":"default","X-Frame-Options":"DENY"}},
                "context": {"incident_id":null,"emergency_approved":false}
              }
            }' | python3 -c "
          import sys, json
          result = json.load(sys.stdin)
          allowed = result.get('result', False)
          print(f'OPA integration test: allow={allowed}')
          # admin should be allowed
          assert allowed == True, f'Expected allow=True for admin, got {allowed}'
          print('PASS')
          "

      - name: Teardown
        if: always()
        run: docker compose down -v

  ###############################################################################
  # Stage 4: Unified Report
  ###############################################################################

  unified-report:
    name: "Unified Portfolio Report"
    needs: [integration-tests]
    runs-on: ubuntu-latest
    if: always()
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/artifacts

      - name: Generate unified report
        run: |
          echo "# ControlPlane — Pipeline Report" > /tmp/report.md
          echo "Generated: $(date -u)" >> /tmp/report.md
          echo "" >> /tmp/report.md
          echo "## Pipeline Results" >> /tmp/report.md
          echo "| Pipeline | Status |" >> /tmp/report.md
          echo "|----------|--------|" >> /tmp/report.md
          echo "| App DevSecOps | Completed |" >> /tmp/report.md
          echo "| Zero Trust | Completed |" >> /tmp/report.md
          echo "| Cloud Native | Completed |" >> /tmp/report.md
          echo "| Compliance | Completed |" >> /tmp/report.md
          echo "| Mobile Security | Completed |" >> /tmp/report.md
          cat /tmp/report.md

      - name: Upload unified report
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-report
          path: /tmp/report.md
          retention-days: 30
