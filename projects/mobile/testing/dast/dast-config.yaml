# Dynamic Application Security Testing Configuration

# Global settings
settings:
  scan_timeout: 3600 # 1 hour
  threads: 4
  report_format: json
  fail_on_severity: high

# Network Security Tests
network_security:
  # SSL/TLS Tests
  ssl_tls:
    enabled: true
    tests:
      - name: ssl_version
        min_version: TLS1.2
        check_weak_ciphers: true
      - name: certificate_validation
        check_expiry: true
        check_revocation: true
      - name: ssl_pinning_bypass
        enabled: true
        methods:
          - proxy_certificate
          - system_store_injection

  # API Security
  api_security:
    enabled: true
    tests:
      - name: authentication_bypass
        methods:
          - token_manipulation
          - session_fixation
          - oauth_flow_manipulation
      - name: authorization_checks
        check_vertical_privileges: true
        check_horizontal_privileges: true
      - name: input_validation
        check_sql_injection: true
        check_xss: true
        check_xxe: true
        check_ssrf: true

# Runtime Security Tests
runtime_security:
  # Root/Jailbreak Detection
  root_detection:
    enabled: true
    tests:
      - check_binaries
      - check_permissions
      - check_processes
      - check_packages

  # Anti-Debug Protection
  debug_protection:
    enabled: true
    tests:
      - detect_debugger
      - detect_emulator
      - detect_frida
      - detect_xposed

  # Code Integrity
  code_integrity:
    enabled: true
    tests:
      - verify_signatures
      - check_tampering
      - verify_checksums

# Data Security Tests
data_security:
  # Storage Security
  storage:
    enabled: true
    locations:
      - shared_preferences
      - sqlite_databases
      - realm_databases
      - files_dir
      - cache_dir
      - keychain
      - keystore
    checks:
      - encryption_check
      - sensitive_data_search
      - backup_protection

  # Network Traffic
  traffic_analysis:
    enabled: true
    checks:
      - cleartext_detection
      - sensitive_data_transmission
      - certificate_pinning_validation
    capture:
      port: 8080
      save_traffic: true
      decrypt_ssl: true

# UI/Application Tests
application_tests:
  # Deep Link Testing
  deep_links:
    enabled: true
    tests:
      - url_validation
      - scheme_validation
      - parameter_validation

  # WebView Security
  webview:
    enabled: true
    tests:
      - javascript_enabled
      - file_access
      - universal_access
      - safe_browsing

  # Clipboard Security
  clipboard:
    enabled: true
    tests:
      - sensitive_data_detection
      - persistence_check

# Compliance Tests
compliance:
  # OWASP MASVS
  masvs:
    enabled: true
    level: L2 # L1=Standard, L2=Defense-in-depth
    categories:
      - architecture
      - storage
      - cryptography
      - authentication
      - network
      - platform
      - code_quality
      - resilience

  # Platform Guidelines
  platform_compliance:
    ios:
      enabled: true
      tests:
        - app_transport_security
        - privacy_permissions
        - data_protection
    android:
      enabled: true
      tests:
        - manifest_security
        - permission_validation
        - protected_components

# Automated Exploitation
exploitation:
  enabled: false # Disabled by default for safety
  techniques:
    - name: authentication_bypass
      max_attempts: 100
      delay: 100 # ms between attempts
    - name: session_manipulation
      max_attempts: 50
      delay: 200
    - name: injection_attacks
      max_attempts: 75
      delay: 150

# Reporting
reporting:
  output_dir: reports/dast
  formats:
    - json
    - html
    - pdf
  include:
    - screenshots
    - traffic_logs
    - reproduction_steps
  metrics:
    - total_vulnerabilities
    - severity_distribution
    - test_coverage
    - scan_duration
  integrations:
    - jira
    - slack
    - email

# Remediation
remediation:
  provide_fixes: true
  include_references: true
  priority_calculation:
    factors:
      - severity
      - exploitability
      - business_impact
    weights:
      severity: 0.4
      exploitability: 0.3
      business_impact: 0.3
