# Interactive Application Security Testing Configuration

# Global settings
settings:
  agent_mode: active # active/passive
  sampling_rate: 100 # percentage
  stack_trace_limit: 50
  max_payload_size: 10485760 # 10MB
  enable_remote_updates: true

# Instrumentation
instrumentation:
  # Method Tracing
  method_tracing:
    enabled: true
    packages:
      ios:
        - UIKit
        - Foundation
        - Security
        - CommonCrypto
      android:
        - android.security
        - javax.crypto
        - java.security
        - okhttp3
    exclusions:
      - "**/test/**"
      - "**/build/**"

  # Data Flow Tracking
  data_flow:
    enabled: true
    sources:
      - user_input
      - file_system
      - network
      - ipc
      - system_properties
    sinks:
      - sql_queries
      - file_operations
      - network_requests
      - logging
      - clipboard
    sanitizers:
      - input_validation
      - encoding
      - encryption

# Security Sensors
sensors:
  # Cryptography
  crypto:
    enabled: true
    track:
      - key_generation
      - encryption_operations
      - decryption_operations
      - hash_operations
    alerts:
      - weak_algorithms
      - key_reuse
      - iv_reuse

  # Authentication
  authentication:
    enabled: true
    track:
      - login_attempts
      - session_management
      - token_handling
      - biometric_operations
    alerts:
      - auth_bypass
      - session_fixation
      - token_exposure

  # Data Storage
  storage:
    enabled: true
    track:
      - file_operations
      - database_operations
      - keychain_access
      - shared_preferences
    alerts:
      - unencrypted_storage
      - world_readable_files
      - sensitive_data_exposure

# Runtime Protection
runtime_protection:
  # Memory Protection
  memory:
    enabled: true
    features:
      - buffer_overflow
      - memory_corruption
      - format_string
      - heap_inspection

  # Code Execution
  code_execution:
    enabled: true
    features:
      - dynamic_loading
      - reflection_usage
      - native_calls
      - javascript_bridge

  # Process Manipulation
  process:
    enabled: true
    features:
      - debugging_detection
      - hooking_detection
      - tampering_detection
      - root_detection

# Vulnerability Detection
vulnerability_detection:
  # Injection Flaws
  injection:
    enabled: true
    types:
      - sql
      - nosql
      - command
      - xpath
      - ldap
    depth: 3 # analysis depth

  # Access Control
  access_control:
    enabled: true
    checks:
      - vertical_privileges
      - horizontal_privileges
      - url_authorization
      - function_authorization

  # Secure Communication
  communication:
    enabled: true
    checks:
      - ssl_validation
      - certificate_pinning
      - protocol_security
      - data_leakage

# Real-time Analysis
realtime_analysis:
  enabled: true
  features:
    # Taint Analysis
    taint_analysis:
      enabled: true
      propagation_depth: 5
      context_sensitivity: true

    # Control Flow Analysis
    control_flow:
      enabled: true
      max_paths: 1000
      loop_limit: 10

    # Data Flow Analysis
    data_flow:
      enabled: true
      alias_analysis: true
      constant_propagation: true

# Response Actions
response_actions:
  # Blocking
  blocking:
    enabled: true
    triggers:
      - severity: critical
        action: block_request
      - severity: high
        action: log_warning

  # Logging
  logging:
    enabled: true
    levels:
      - debug
      - info
      - warning
      - error
    format:
      include_stack_trace: true
      include_context: true

  # Alerts
  alerts:
    enabled: true
    channels:
      - console
      - file
      - syslog
      - http_webhook

# Reporting
reporting:
  # Real-time Reports
  realtime:
    enabled: true
    interval: 60 # seconds
    metrics:
      - active_sessions
      - vulnerability_count
      - blocked_requests

  # Detailed Reports
  detailed:
    enabled: true
    format: json
    include:
      - vulnerability_details
      - stack_traces
      - reproduction_steps
      - remediation_advice
    export:
      - file_system
      - security_dashboard
      - ticket_system

# Integration
integration:
  # CI/CD Integration
  ci_cd:
    enabled: true
    fail_build:
      severity: high
      count: 1

  # Security Tools
  security_tools:
    enabled: true
    export_to:
      - siem
      - vulnerability_tracker
      - incident_management

  # Development Tools
  dev_tools:
    enabled: true
    ide_plugins:
      - vscode
      - intellij
      - xcode
      - android_studio
