apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm-config
  namespace: security
data:
  realm.json: |
    {
      "realm": "zero-trust",
      "enabled": true,
      "sslRequired": "external",
      "registrationAllowed": false,
      "bruteForceProtected": true,
      "failureFactor": 3,
      "waitIncrementSeconds": 60,
      "quickLoginCheckMilliSeconds": 1000,
      "maxFailureWaitSeconds": 900,
      "minimumQuickLoginWaitSeconds": 60,
      "maxDeltaTimeSeconds": 43200,
      "accessTokenLifespan": 300,
      "accessTokenLifespanForImplicitFlow": 300,
      "ssoSessionIdleTimeout": 1800,
      "ssoSessionMaxLifespan": 36000,
      "offlineSessionIdleTimeout": 2592000,
      "accessCodeLifespan": 60,
      "accessCodeLifespanUserAction": 300,
      "accessCodeLifespanLogin": 1800,
      "passwordPolicy": "hashAlgorithm(pbkdf2-sha256) and length(12) and upperCase(1) and lowerCase(1) and digits(1) and specialChars(1) and notUsername(undefined) and notEmail(undefined) and passwordHistory(3)",
      "defaultRoles": ["user"],
      "requiredCredentials": ["password"],
      "otpPolicyType": "totp",
      "otpPolicyAlgorithm": "HmacSHA256",
      "otpPolicyInitialCounter": 0,
      "otpPolicyDigits": 6,
      "otpPolicyLookAheadWindow": 1,
      "otpPolicyPeriod": 30,
      "browserSecurityHeaders": {
        "contentSecurityPolicy": "frame-src 'self'; frame-ancestors 'self'; object-src 'none';",
        "xContentTypeOptions": "nosniff",
        "xRobotsTag": "none",
        "xFrameOptions": "SAMEORIGIN",
        "xXSSProtection": "1; mode=block",
        "strictTransportSecurity": "max-age=31536000; includeSubDomains"
      },
      "smtpServer": {
        "host": "smtp.example.com",
        "port": "587",
        "from": "no-reply@example.com",
        "fromDisplayName": "Zero Trust Security",
        "ssl": false,
        "starttls": true,
        "auth": true
      },
      "loginTheme": "keycloak",
      "accountTheme": "keycloak",
      "adminTheme": "keycloak",
      "emailTheme": "keycloak",
      "eventsEnabled": true,
      "eventsListeners": ["jboss-logging"],
      "enabledEventTypes": [
        "LOGIN", "LOGIN_ERROR", "LOGOUT", "LOGOUT_ERROR",
        "REGISTER", "REGISTER_ERROR", "UPDATE_PROFILE",
        "UPDATE_PASSWORD", "UPDATE_TOTP", "REMOVE_TOTP",
        "GRANT_CONSENT", "UPDATE_CONSENT", "REVOKE_GRANT",
        "VERIFY_EMAIL", "REMOVE_FEDERATED_IDENTITY",
        "FEDERATED_IDENTITY_LINK", "CLIENT_LOGIN",
        "CLIENT_LOGIN_ERROR", "RESTART_AUTHENTICATION",
        "IMPERSONATE", "CUSTOM_REQUIRED_ACTION",
        "SEND_RESET_PASSWORD", "SEND_VERIFY_EMAIL",
        "UPDATE_EMAIL", "EXECUTE_ACTIONS"
      ],
      "adminEventsEnabled": true,
      "adminEventsDetailsEnabled": true,
      "clients": [
        {
          "clientId": "api-gateway",
          "enabled": true,
          "clientAuthenticatorType": "client-secret",
          "secret": "${API_GATEWAY_SECRET}",
          "redirectUris": ["https://api.example.com/*"],
          "webOrigins": ["https://api.example.com"],
          "publicClient": false,
          "protocol": "openid-connect",
          "attributes": {
            "saml.assertion.signature": "false",
            "access.token.lifespan": "300",
            "saml.force.post.binding": "false",
            "saml.multivalued.roles": "false",
            "saml.encrypt": "false",
            "backchannel.logout.revoke.offline.tokens": "false",
            "saml.server.signature": "false",
            "saml.server.signature.keyinfo.ext": "false",
            "exclude.session.state.from.auth.response": "false",
            "backchannel.logout.session.required": "false",
            "client_credentials.use_refresh_token": "false",
            "saml_force_name_id_format": "false",
            "saml.client.signature": "false",
            "tls.client.certificate.bound.access.tokens": "false",
            "saml.authnstatement": "false",
            "display.on.consent.screen": "false",
            "saml.onetimeuse.condition": "false"
          },
          "authenticationFlowBindingOverrides": {},
          "fullScopeAllowed": false,
          "nodeReRegistrationTimeout": -1,
          "protocolMappers": [
            {
              "name": "roles",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-usermodel-realm-role-mapper",
              "consentRequired": false,
              "config": {
                "multivalued": "true",
                "userinfo.token.claim": "true",
                "id.token.claim": "true",
                "access.token.claim": "true",
                "claim.name": "roles",
                "jsonType.label": "String"
              }
            },
            {
              "name": "groups",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-group-membership-mapper",
              "consentRequired": false,
              "config": {
                "full.path": "true",
                "id.token.claim": "true",
                "access.token.claim": "true",
                "claim.name": "groups",
                "userinfo.token.claim": "true"
              }
            }
          ]
        }
      ],
      "roles": {
        "realm": [
          {
            "name": "admin",
            "description": "Administrator role with full access"
          },
          {
            "name": "developer",
            "description": "Developer role with limited access"
          },
          {
            "name": "auditor",
            "description": "Auditor role for security review"
          }
        ]
      },
      "groups": [
        {
          "name": "security-team",
          "path": "/security-team",
          "attributes": {},
          "realmRoles": ["admin"],
          "clientRoles": {},
          "subGroups": []
        },
        {
          "name": "development-team",
          "path": "/development-team",
          "attributes": {},
          "realmRoles": ["developer"],
          "clientRoles": {},
          "subGroups": []
        },
        {
          "name": "audit-team",
          "path": "/audit-team",
          "attributes": {},
          "realmRoles": ["auditor"],
          "clientRoles": {},
          "subGroups": []
        }
      ],
      "requiredActions": [
        {
          "alias": "CONFIGURE_TOTP",
          "name": "Configure OTP",
          "providerId": "CONFIGURE_TOTP",
          "enabled": true,
          "defaultAction": true,
          "priority": 10,
          "config": {}
        },
        {
          "alias": "terms_and_conditions",
          "name": "Terms and Conditions",
          "providerId": "terms_and_conditions",
          "enabled": true,
          "defaultAction": true,
          "priority": 20,
          "config": {}
        },
        {
          "alias": "UPDATE_PASSWORD",
          "name": "Update Password",
          "providerId": "UPDATE_PASSWORD",
          "enabled": true,
          "defaultAction": false,
          "priority": 30,
          "config": {}
        },
        {
          "alias": "UPDATE_PROFILE",
          "name": "Update Profile",
          "providerId": "UPDATE_PROFILE",
          "enabled": true,
          "defaultAction": false,
          "priority": 40,
          "config": {}
        },
        {
          "alias": "VERIFY_EMAIL",
          "name": "Verify Email",
          "providerId": "VERIFY_EMAIL",
          "enabled": true,
          "defaultAction": false,
          "priority": 50,
          "config": {}
        }
      ]
    }
