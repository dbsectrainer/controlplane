---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-metrics-scraping
  namespace: security
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: security
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
          podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: 9090 # Prometheus metrics
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
