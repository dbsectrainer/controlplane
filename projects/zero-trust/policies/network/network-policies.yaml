  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: security
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              name: tracing
      ports:
        - protocol: UDP
          port: 6831 # Jaeger agent
        - protocol: TCP
          port: 14268 # Jaeger collector
