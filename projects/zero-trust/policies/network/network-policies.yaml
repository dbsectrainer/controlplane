  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: security
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              name: cert-manager
      ports:
        - protocol: TCP
          port: 443 # ACME protocol
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
