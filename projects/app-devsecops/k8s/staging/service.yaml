apiVersion: v1
kind: Service
metadata:
  name: project3-staging
  namespace: staging
  labels:
    app: project3
    env: staging
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app: project3
    env: staging
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: project3-staging
  namespace: staging
  labels:
    app: project3
    env: staging
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - staging.project3.example.com
      secretName: project3-staging-tls
  rules:
    - host: staging.project3.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: project3-staging
                port:
                  number: 80
