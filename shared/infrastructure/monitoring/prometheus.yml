global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/security-rules.yml

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "vault"
    metrics_path: /v1/sys/metrics
    params:
      format: ["prometheus"]
    bearer_token: "root"
    static_configs:
      - targets: ["vault:8200"]

  - job_name: "keycloak"
    metrics_path: /metrics
    static_configs:
      - targets: ["keycloak:8080"]

  - job_name: "opa"
    metrics_path: /metrics
    static_configs:
      - targets: ["opa:8181"]

  - job_name: "demo-app"
    metrics_path: /metrics
    static_configs:
      - targets: ["demo-app:3000"]

  - job_name: "compliance-reporter"
    metrics_path: /metrics
    static_configs:
      - targets: ["compliance-reporter:8088"]
