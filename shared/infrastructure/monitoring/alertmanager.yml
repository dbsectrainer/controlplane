global:
  smtp_smarthost: "mailhog:1025"
  smtp_from: "alertmanager@portfolio.local"
  smtp_require_tls: false

route:
  group_by: ["alertname", "severity"]
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 3h
  receiver: "default"
  routes:
    - match:
        severity: critical
      receiver: "security-critical"
    - match:
        severity: warning
      receiver: "security-warning"

receivers:
  - name: "default"
    email_configs:
      - to: "security@portfolio.local"

  - name: "security-critical"
    email_configs:
      - to: "security@portfolio.local"

  - name: "security-warning"
    email_configs:
      - to: "security@portfolio.local"

inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname"]
