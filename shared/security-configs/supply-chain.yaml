# Supply Chain Security Configuration for Zero Trust Security
apiVersion: security.supply-chain/v1
kind: SupplyChainSecurity
metadata:
  name: zero-trust-supply-chain
  description: "Supply chain security controls for zero trust architecture"

dependencies:
  # Identity Dependencies
  scanning:
    - name: "identity-dependencies"
      type: "identity"
      config:
        minSeverity: "HIGH"
        autoFix: false
        ignorePaths:
          - "**/node_modules/**"
          - "**/vendor/**"
        tools:
          - name: "identity-scanner"
            enabled: true
            threshold: "HIGH"
            scope: "identity"
            zeroTrustPrinciples:
              - "verify-explicitly"
              - "never-trust"
          - name: "auth-scanner"
            enabled: true
            threshold: "CRITICAL"
            scope: "authentication"
            zeroTrustPrinciples:
              - "verify-explicitly"
              - "assume-breach"

    - name: "access-dependencies"
      type: "access"
      config:
        minSeverity: "HIGH"
        autoFix: false
        tools:
          - name: "policy-analyzer"
            enabled: true
            threshold: "HIGH"
            scope: "authorization"
            zeroTrustPrinciples:
              - "use-least-privilege"
              - "never-trust"
          - name: "permission-analyzer"
            enabled: true
            threshold: "CRITICAL"
            scope: "permissions"
            zeroTrustPrinciples:
              - "use-least-privilege"
              - "assume-breach"

sbom:
  # Software Bill of Materials
  generation:
    - name: "identity-sbom"
      tool: "syft"
      format: "cyclonedx"
      output: "sbom.json"
      sources:
        - type: "filesystem"
          paths:
            - "identity/"
            - "policies/"
        - type: "container"
          images:
            - "keycloak:latest"
            - "vault:latest"
      zeroTrustPrinciples:
        - "verify-explicitly"
        - "never-trust"

  validation:
    - name: "sbom-validation"
      tool: "cyclonedx"
      checks:
        - type: "completeness"
          threshold: 0.99
          zeroTrustPrinciples:
            - "verify-explicitly"
        - type: "accuracy"
          threshold: 0.99
          zeroTrustPrinciples:
            - "never-trust"
        - type: "freshness"
          maxAge: "7d"
          zeroTrustPrinciples:
            - "assume-breach"

signing:
  # Artifact Signing
  certificates:
    - name: "identity-signing"
      type: "x509"
      provider: "vault"
      config:
        path: "pki/issue/identity-signing"
        ttl: "8760h"
        keyType: "rsa"
        keyBits: 4096
      zeroTrustPrinciples:
        - "verify-explicitly"
        - "encrypt-all-data"

  policies:
    - name: "artifact-signing"
      type: "cosign"
      config:
        required: true
        verify: true
        keyRef: "kms://aws/key/identity-signing"
        annotations:
          - "build_id"
          - "identity_verified"
          - "security_scan"
      zeroTrustPrinciples:
        - "verify-explicitly"
        - "never-trust"

verification:
  # Identity Verification
  identity:
    - name: "identity-verification"
      type: "identity"
      config:
        requireSigned: true
        requireMFA: true
        requireAudit: true
        artifacts:
          - "**/*.key"
          - "**/*.cert"
          - "**/*.token"
      zeroTrustPrinciples:
        - "verify-explicitly"
        - "never-trust"

  access:
    - name: "access-verification"
      type: "access"
      config:
        requirePolicy: true
        requireApproval: true
        requireJIT: true
        allowedSources:
          - "trusted-identity-provider"
          - "vault-auth-provider"
        bannedPatterns:
          - "shared-credentials"
          - "static-tokens"
      zeroTrustPrinciples:
        - "use-least-privilege"
        - "assume-breach"

monitoring:
  # Supply Chain Monitoring
  metrics:
    - name: "identity_verification"
      type: "gauge"
      description: "Identity verification status"
      labels:
        - "component"
        - "stage"
        - "status"
      zeroTrustPrinciples:
        - "verify-explicitly"

    - name: "access_verification"
      type: "gauge"
      description: "Access verification status"
      labels:
        - "policy"
        - "resource"
        - "status"
      zeroTrustPrinciples:
        - "never-trust"

alerts:
  # Alert Configuration
  rules:
    - name: "unverified-identity"
      expr: |
        identity_verification{status="unverified"} > 0
      for: "5m"
      labels:
        severity: critical
      annotations:
        summary: "Unverified identity detected in supply chain"
        zeroTrustPrinciples:
          - "verify-explicitly"
          - "never-trust"

    - name: "excessive-permissions"
      expr: |
        access_verification{status="excessive"} > 0
      for: "5m"
      labels:
        severity: warning
      annotations:
        summary: "Excessive permissions detected in supply chain"
        zeroTrustPrinciples:
          - "use-least-privilege"
          - "assume-breach"

automation:
  # Automated Actions
  actions:
    - name: "identity-verification"
      trigger:
        type: "identity"
        condition: "unverified"
      steps:
        - name: "verify-identity"
          action: "enforce_verification"
          config:
            scope: "affected_components"
            notify: true
            zeroTrustPrinciples:
              - "verify-explicitly"
              - "never-trust"

    - name: "access-remediation"
      trigger:
        type: "access"
        condition: "excessive_permissions"
      steps:
        - name: "adjust-permissions"
          action: "reduce_scope"
          config:
            scope: "affected_resources"
            approval: true
            zeroTrustPrinciples:
              - "use-least-privilege"
              - "assume-breach"

reporting:
  # Supply Chain Reports
  schedules:
    - name: "daily-identity-report"
      schedule: "0 7 * * *"
      format: "pdf"
      sections:
        - "Identity Verification Status"
        - "Access Control Status"
        - "Policy Compliance"
        - "Action Items"
      distribution:
        - "security-team@example.com"
        - "identity-team@example.com"
      zeroTrustPrinciples:
        - "verify-explicitly"
        - "never-trust"

    - name: "weekly-audit-report"
      schedule: "0 7 * * 1"
      format: "pdf"
      sections:
        - "Supply Chain Status"
        - "Identity Posture"
        - "Access Controls"
        - "Risk Assessment"
      distribution:
        - "auditors@example.com"
        - "security-leadership@example.com"
      zeroTrustPrinciples:
        - "assume-breach"
        - "use-least-privilege"

policies:
  # Security Policies
  identity:
    - name: "secure-identity"
      rules:
        - name: "identity-requirements"
          enforce: true
          checks:
            - "mfa-enabled"
            - "identity-verified"
            - "token-validation"
          zeroTrustPrinciples:
            - "verify-explicitly"
            - "never-trust"

  access:
    - name: "secure-access"
      rules:
        - name: "access-requirements"
          enforce: true
          checks:
            - "least-privilege"
            - "just-in-time"
            - "time-bound"
          zeroTrustPrinciples:
            - "use-least-privilege"
            - "assume-breach"
